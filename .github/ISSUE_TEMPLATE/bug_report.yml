---
name: Bug report
description: Something in the reference implementation or examples is broken
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    value: |
      Thanks for helping improve the Draft reference. Please run the quickstart first if your report is about "memory not working" — many issues are environment/setup related.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect vs what you saw?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        cd examples && npm install && npm start
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Node 20.x, macOS / Linux / Windows"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I did not paste production DIDs, internal paths, or private deployment details
          required: true
